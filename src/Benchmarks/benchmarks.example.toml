# ── NDArray reduction ────────────────────────────────────────────────────

[benchmarks.ndarray-reduction]

[benchmarks.ndarray-reduction.params]
device = "host"
# More threads are not effective
openmp-max-threads = 4
# Reduced sizes for ~2 min total runtime (default is much larger)
sizes-2d-3d = [256, 1024]
sizes-4d = [64, 256]
sizes-5d-6d = [16, 64]
min-elements = 1000000
max-elements = 50000000

[benchmarks.ndarray-reduction-cuda]

[benchmarks.ndarray-reduction-cuda.params]
device = "cuda"
# Reduced sizes for ~1 min total runtime (default is much larger)
sizes-2d-3d = [256, 1024]
sizes-4d = [64, 256]
sizes-5d-6d = [16, 64]
min-elements = 10000000
max-elements = 100000000

# ── Memory access ─────────────────────────────────────────────────────────

[benchmarks.memory-access]

[benchmarks.memory-access.params]
threads-count = [1, 2, 4, 8]
access-type = [
    "sequential",
    "interleaved",
    #"random", # Note: very slow
]
element-size = [1, 2, 4, 16, 64, 256]
max-array-size = 268435456 # 256 MB
test-type = ["read", "write", "read-write"]

# ── ODE solvers ──────────────────────────────────────────────────────────

[benchmarks.ode-solvers]

[benchmarks.ode-solvers.params]
precision = "double"
device = "all"
adaptivity = 0.001
solvers = "all"

# ── Sorting ──────────────────────────────────────────────────────────────

[benchmarks.sort]

[benchmarks.sort.params]
size = [
    1000,     # ~1K
    1024,     # 2^10
    5000,     # ~5K
    8192,     # 2^13
    10000,    # ~10K
    16384,    # 2^14
    50000,    # ~50K
    65536,    # 2^16
    100000,   # ~100K
    262144,   # 2^18
    500000,   # ~500K
    1048576,  # 2^20
    2000000,  # ~2M
    4194304,  # 2^22
    10000000, # ~10M
    # 16777216,    # 2^24
    # 50000000,    # ~50M
    # 67108864,    # 2^26
    # 100000000,   # ~100M
]
device = "host"
value-type = ["int", "uint", "double"]

[benchmarks.sort-cuda]

[benchmarks.sort-cuda.params]
size = [
    1000,     # ~1K
    1024,     # 2^10
    5000,     # ~5K
    8192,     # 2^13
    10000,    # ~10K
    16384,    # 2^14
    50000,    # ~50K
    65536,    # 2^16
    100000,   # ~100K
    262144,   # 2^18
    500000,   # ~500K
    1048576,  # 2^20
    2000000,  # ~2M
    4194304,  # 2^22
    10000000, # ~10M
    # 16777216,    # 2^24
    # 50000000,    # ~50M
    # 67108864,    # 2^26
    # 100000000,   # ~100M
]
device = "all"
value-type = ["int", "uint", "double"]
