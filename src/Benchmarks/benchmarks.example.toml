#]
#shift-value = -0.8

# ── Eigen random ─────────────────────────────────────────────────────────

[benchmarks.eigen-random]

[benchmarks.eigen-random.params]
# QR algorithm is very slow compared to the other benchmarks
with-qr-householder = false
with-qr-gram-schmidt = false
with-qr-givens = false
# limit maximum size of generated matrices
max-size-dense = 2000
max-size-sparse = 2000

# ── Heat equation ────────────────────────────────────────────────────────

[benchmarks.heat-equation]

[benchmarks.heat-equation.params]
device = "all"
precision = ["float", "double"]
implementation = ["parallel-for", "simple-grid", "grid", "nd-grid"]
max-x-dimension = 800
max-y-dimension = 800
max-iterations = 500
loops = 1
final-time = 0.1
write-data = false

