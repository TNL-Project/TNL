# Example benchmark configuration for TNL
#
# Benchmarks are auto-discovered from bin_dir by filename prefix.
# The benchmarks section only customizes invocation — entries that need
# non-default params, log file, or command prefix should be listed here.
# Discovered benchmarks without a config entry run with common defaults.
#
# Usage:
#   uv run src/Tools/tnl-run-benchmarks.py -c benchmarks.example.toml
#   uv run src/Tools/tnl-run-benchmarks.py -c benchmarks.example.toml -n          # dry-run
#   uv run src/Tools/tnl-run-benchmarks.py -c benchmarks.example.toml -b sort     # select by name
#   uv run src/Tools/tnl-run-benchmarks.py -c benchmarks.example.toml --include '*-eigen*'  # glob filter
#   uv run src/Tools/tnl-run-benchmarks.py -c benchmarks.example.toml --exclude '*-eigen*'  # glob filter
#   uv run src/Tools/tnl-run-benchmarks.py -c benchmarks.example.toml --list      # list benchmarks

[common]
bin_dir = "./build/bin"
output_mode = "append"
verbose = 1
loops = 10

